x-app: &app
  image: ${DOCKER_APP_IMAGE}
  restart: unless-stopped
  environment:
    TZ: Asia/Seoul
    SERVER_PORT: 8080
    MANAGEMENT_SERVER_PORT: 8082
  networks:
    - app-network

services:
  app-blue:
    <<: *app
    container_name: app-blue
    ports:
      - "8080:8080"
      - "8082:8082"

  app-green:
    <<: *app
    container_name: app-green
    ports:
      - "8081:8080"
      - "8083:8082"

networks:
  app-network:
    external: true
    name: ${COMPOSE_SHARED_NETWORK:-dripnote_default}
